            }

            }

                right: 10px;
                padding: 0.5rem;
            }

</head>

        // Detect user language from browser
        function detectLanguage() {
            const browserLang = navigator.language || navigator.userLanguage;
            const langCode = browserLang.split('-')[0];
            
            // Special handling for Moroccan Arabic
            if (browserLang === 'ar-MA') return 'ma';
            
            // Return detected language if available, otherwise default to English
            return translations[langCode] ? langCode : 'en';
        }

        // Switch language function
        function switchLanguage(lang) {
            const content = translations[lang];
            if (!content) return;
            
            // Update HTML dir attribute
            document.body.setAttribute('dir', content.dir);
            document.documentElement.setAttribute('lang', lang);
            
            // Update meta tags
            document.getElementById('page-title').textContent = content.pageTitle;
            document.getElementById('page-description').setAttribute('content', content.metaDescription);
            document.getElementById('og-title').setAttribute('content', content.pageTitle);
            document.getElementById('og-description').setAttribute('content', content.metaDescription);
            document.getElementById('twitter-title').setAttribute('content', content.pageTitle);
            document.getElementById('twitter-description').setAttribute('content', content.metaDescription);
            
            // Update banner
            document.querySelector('.banner-text').textContent = content.bannerText;
            
            // Update hero
            document.querySelector('.kicker-text').textContent = content.kicker;
            document.querySelector('.hero-headline').innerHTML = content.headline;
            document.querySelector('.subtitle-text').textContent = content.subtitle;
            
            // Update stats
            document.querySelector('.stat-label-1').textContent = content.statLabel1;
            document.querySelector('.stat-label-2').textContent = content.statLabel2;
            document.querySelector('.stat-label-3').textContent = content.statLabel3;
            
            // Update CTA
            document.querySelector('.cta-text').textContent = content.ctaText;
            
            // Update problem section
            document.querySelector('.section-title-1').innerHTML = content.sectionTitle1;
            document.querySelector('.problem-title-1').textContent = content.problemTitle1;
            document.querySelector('.problem-desc-1').textContent = content.problemDesc1;
            document.querySelector('.problem-title-2').textContent = content.problemTitle2;
            document.querySelector('.problem-desc-2').textContent = content.problemDesc2;
            document.querySelector('.problem-title-3').textContent = content.problemTitle3;
            document.querySelector('.problem-desc-3').textContent = content.problemDesc3;
            document.querySelector('.problem-title-4').textContent = content.problemTitle4;
            document.querySelector('.problem-desc-4').textContent = content.problemDesc4;
            
            // Update testimonials
            document.querySelector('.testimonials-title').textContent = content.testimonialsTitle;
            document.querySelector('.testimonial-1').textContent = content.testimonial1;
            document.querySelector('.testimonial-result-1').textContent = content.testimonialResult1;
            document.querySelector('.testimonial-2').textContent = content.testimonial2;
            document.querySelector('.testimonial-result-2').textContent = content.testimonialResult2;
            document.querySelector('.testimonial-3').textContent = content.testimonial3;
            document.querySelector('.testimonial-result-3').textContent = content.testimonialResult3;
            
            // Update language selector
            document.getElementById('language-selector').value = lang;
            
            // Store preference
            localStorage.setItem('preferredLanguage', lang);
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            const savedLang = localStorage.getItem('preferredLanguage');
            const lang = savedLang || detectLanguage();
            switchLanguage(lang);
        });
    </script>
